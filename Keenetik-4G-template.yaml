zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  templates:
    - uuid: a3166d720c2d4c50b9b3991204bdf3f0
      template: 'Keenetic 4G-LTE'
      name: 'Keenetic 4G-LTE'
      description: 'Keenetic/Netcraze 4G modem LTE network parameters measure'
      groups:
        - name: Templates
      discovery_rules:
        - uuid: 51635b43f95f4ce8b38195bdb596e9f7
          name: 'RSSI discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#DEVRSSI},.1.3.6.1.4.1.9.9.661.1.3.4.1.1.1]'
          key: c3gCurrentGsmRssi
          delay: 4h
          description: |
            CISCO-WAN-3G-MIB
            .1.3.6.1.4.1.9.9.661.1.3.4.1.1.1.[#DEVNUM]
            C3gRssi (INTEGER) (-150.0)
          item_prototypes:
            - uuid: 2724edf0ab504984bbec1dea90ddda4b
              name: 'RSSI[{#SNMPINDEX}]'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.9.9.661.1.3.4.1.1.1.{#SNMPINDEX}'
              key: 'c3gCurrentGsmRssi[{#SNMPINDEX}]'
              delay: 2m
              value_type: FLOAT
              units: dBm
              description: |
                CISCO-WAN-3G-MIB
                C3gRssi (INTEGER) (-150.0)
                The GPRS/UMTS/LTE RSSI value
                RSSI отражает силу принимаемого сигнала. Значения ближе к 0 означают более высокую мощность
              tags:
                - tag: 'network scope'
                  value: LTE
        - uuid: b52fe552dd084b98b58aaccd150aac05
          name: 'RSRP discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#DEVRSRP},.1.3.6.1.4.1.9.9.817.1.1.1.1.1.1]'
          key: cwceLteCurrRsrp
          delay: 4h
          description: |
            CISCO-WAN-CELL-EXT-MIB
            cwceLteCurrRsrp
            CiscoWanCellExtRsrp (INTEGER)
            This object indicates the LTE RSRP value reported by the modem.
          item_prototypes:
            - uuid: 96edd874c0844aabbf9884f1c20c7f5f
              name: 'LteRSRP[{#SNMPINDEX}]'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.9.9.817.1.1.1.1.1.1.{#SNMPINDEX}'
              key: 'cwceLteCurrRsrp[{#SNMPINDEX}]'
              delay: 2m
              value_type: FLOAT
              units: dBm
              description: |
                CISCO-WAN-CELL-EXT-MIB
                cwceLteCurrRsrp
                CiscoWanCellExtRsrp (INTEGER)
                This object indicates the LTE RSRP value reported by the modem.
                RSRP, дБм
                RSRP указывает на силу канального сигнала. Значения ближе к 0 означают более высокую мощность.
              tags:
                - tag: 'network scope'
                  value: LTE
        - uuid: cdae9ff234ba496d9d086b81f8e58675
          name: 'RSRQ discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#DEVRSRQ},.1.3.6.1.4.1.9.9.817.1.1.1.1.1.2]'
          key: cwceLteCurrRsrq
          delay: 4h
          description: |
            CISCO-WAN-CELL-EXT-MIB
            cwceLteCurrRsrq
            CiscoWanCellExtRsrq (INTEGER)
            This object indicates the LTE RSRQ value reported by the modem.
          item_prototypes:
            - uuid: e241842ab76148adacf3da4f7b503a75
              name: 'LteRSRQ[{#SNMPINDEX}]'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.9.9.817.1.1.1.1.1.2.{#SNMPINDEX}'
              key: 'cwceLteCurrRsrq[{#SNMPINDEX}]'
              delay: 2m
              value_type: FLOAT
              units: db
              description: |
                CISCO-WAN-CELL-EXT-MIB
                cwceLteCurrRsrq
                CiscoWanCellExtRsrq (INTEGER)
                This object indicates the LTE RSRQ value reported by the modem.
                RSRQ, дБ 
                RSRQ представляет качество канального сигнала. Чем ближе к 0, тем лучше избирательность
              tags:
                - tag: 'network scope'
                  value: LTE
        - uuid: 34e994578fb349e9b17ddeec9d2a840d
          name: 'SINR discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#DEVRSINR},.1.3.6.1.4.1.9.9.817.1.1.1.1.1.4]'
          key: cwceLteCurrSinr
          delay: 4h
          description: |
            cwceLteCurrSinr
            CiscoWanCellExtSINR (INTEGER)
            This object indicates the LTE SINR value measured in decibels (dB) reported by the modem.
          item_prototypes:
            - uuid: f46afe775a5a4012ab1133bf406db537
              name: 'LteSINR[{#SNMPINDEX}]'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.9.9.817.1.1.1.1.1.4.{#SNMPINDEX}'
              key: 'cwceLteCurrSinr[{#SNMPINDEX}]'
              delay: 2m
              value_type: FLOAT
              units: db
              description: |
                cwceLteCurrSinr
                CiscoWanCellExtSINR (INTEGER)
                This object indicates the LTE SINR value measured in decibels (dB) reported by the modem.
                SINR характеризует пропускную способность канала. Более высокие значения означают лучшую производительность.
              tags:
                - tag: 'network scope'
                  value: LTE
        - uuid: 068315cd8ac048f8a1fbd32e69afc564
          name: 'SNR discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#DEVRSNR},.1.3.6.1.4.1.9.9.817.1.1.1.1.1.3]'
          key: cwceLteCurrSnr
          delay: 4h
          description: |
            CISCO-WAN-CELL-EXT-MIB
            cwceLteCurrSnr
            CiscoWanCellExtSNR (INTEGER)
            This object indicates the LTE SNR value reported by the modem.
          item_prototypes:
            - uuid: df32ae9e42e44358b47578a991373909
              name: 'LteSNR[{#SNMPINDEX}]'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.9.9.817.1.1.1.1.1.3.{#SNMPINDEX}'
              key: 'cwceLteCurrSnr[{#SNMPINDEX}]'
              delay: 2m
              value_type: FLOAT
              units: db
              description: |
                cwceLteCurrSnr
                CiscoWanCellExtSNR (INTEGER)
                This object indicates the LTE SNR value reported by the modem.
              tags:
                - tag: 'network scope'
                  value: LTE
